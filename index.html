<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チャット</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="screen-login" class="screen">
  <div class="auth-card">
    <div class="auth-logo">💬</div>
    <h1 class="auth-title">チャットへようこそ</h1>
    <div class="tab-row">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">ログイン</button>
      <button class="tab" id="tab-register" onclick="switchTab('register')">新規登録</button>
    </div>
    <input id="auth-username" class="field" type="text" placeholder="ユーザー名" maxlength="20" autocomplete="username">
    <input id="auth-password" class="field" type="password" placeholder="パスワード" autocomplete="current-password">
    <label class="remember-label">
      <input type="checkbox" id="remember-me"> ログインしたままにする
    </label>
    <button class="btn-primary" id="auth-btn" onclick="doAuth()">ログイン</button>
    <p class="field-error" id="auth-error"></p>
  </div>
</div>

<!-- ===== ホーム画面 ===== -->
<div id="screen-home" class="screen hidden">
  <header class="home-header">
    <span class="home-logo">💬</span>
    <span class="home-username" id="home-username"></span>
    <button class="btn-ghost icon-btn" onclick="doLogout()" title="ログアウト">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </header>
  <div class="home-body">
    <div class="home-actions">
      <button class="btn-primary" onclick="showScreen('screen-create')">＋ ルームを作る</button>
      <button class="btn-secondary" onclick="showScreen('screen-join')">🔑 ルームに参加</button>
    </div>
    <p class="section-label">参加中のルーム</p>
    <div id="room-list" class="room-list">
      <p class="empty-msg">まだルームがありません</p>
    </div>
  </div>
</div>

<!-- ===== ルーム作成画面 ===== -->
<div id="screen-create" class="screen hidden">
  <header class="sub-header">
    <button class="btn-ghost icon-btn" onclick="showScreen('screen-home')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="sub-title">ルームを作る</span>
  </header>
  <div class="form-body">
    <!-- アイコンプレビュー -->
    <div class="icon-preview-area">
      <div class="icon-preview-circle" id="icon-preview">💬</div>
      <p class="icon-preview-name" id="icon-preview-name">ルーム名</p>
    </div>
    <!-- 絵文字ピッカー -->
    <p class="field-label">ルームアイコン</p>
    <div class="emoji-grid" id="emoji-grid"></div>
    <!-- 入力フォーム -->
    <p class="field-label">ルーム名 <span class="required">*</span></p>
    <input id="create-name" class="field" type="text" placeholder="例: 友達グループ" maxlength="30" oninput="updatePreview()">
    <p class="field-label">パスワード（省略可）</p>
    <input id="create-password" class="field" type="password" placeholder="設定しない場合は空欄">
    <button class="btn-primary" onclick="doCreateRoom()">作成する</button>
    <p class="field-error" id="create-error"></p>
  </div>
</div>

<!-- ===== ルーム参加画面 ===== -->
<div id="screen-join" class="screen hidden">
  <header class="sub-header">
    <button class="btn-ghost icon-btn" onclick="showScreen('screen-home')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="sub-title">ルームに参加</span>
  </header>
  <div class="form-body">
    <p class="field-label">ルームコード <span class="required">*</span></p>
    <input id="join-code" class="field" type="text" placeholder="例: XK7F2A" maxlength="6" style="text-transform:uppercase">
    <p class="field-label">パスワード（必要な場合）</p>
    <input id="join-password" class="field" type="password" placeholder="パスワードがない場合は空欄">
    <button class="btn-primary" onclick="doJoinRoom()">参加する</button>
    <p class="field-error" id="join-error"></p>
  </div>
</div>

<!-- ===== チャット画面 ===== -->
<div id="screen-chat" class="screen hidden">
  <header class="chat-header">
    <button class="btn-ghost icon-btn" onclick="leaveRoom()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="chat-header-info">
      <span id="chat-room-icon">💬</span>
      <span id="chat-room-name">ルーム</span>
    </div>
    <span class="online-badge">
      <span class="online-dot"></span>
      <span id="online-count">0</span>人
    </span>
  </header>

  <!-- 返信プレビューバー -->
  <div id="reply-bar" class="reply-bar hidden">
    <div class="reply-bar-inner">
      <span class="reply-bar-label">返信先:</span>
      <span id="reply-bar-text" class="reply-bar-text"></span>
    </div>
    <button class="btn-ghost icon-btn" onclick="cancelReply()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <!-- 編集モードバー -->
  <div id="edit-bar" class="reply-bar edit-mode hidden">
    <div class="reply-bar-inner">
      <span class="reply-bar-label" style="color:#06C755">編集中:</span>
      <span id="edit-bar-text" class="reply-bar-text"></span>
    </div>
    <button class="btn-ghost icon-btn" onclick="cancelEdit()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>

  <main id="message-list" class="message-list"></main>

  <footer class="chat-footer">
    <input id="message-input" class="message-input" type="text" placeholder="メッセージを入力..." maxlength="500" autocomplete="off">
    <button id="send-btn" class="send-btn" onclick="sendMessage()" aria-label="送信">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </footer>
</div>

<!-- ===== コンテキストメニュー ===== -->
<div id="ctx-menu" class="ctx-menu hidden">
  <button id="ctx-reply"  class="ctx-item" onclick="ctxAction('reply')">↩ 返信</button>
  <button id="ctx-copy"   class="ctx-item" onclick="ctxAction('copy')">📋 コピー</button>
  <button id="ctx-edit"   class="ctx-item ctx-own" onclick="ctxAction('edit')">✏️ 編集</button>
  <button id="ctx-recall" class="ctx-item ctx-own ctx-danger" onclick="ctxAction('recall')">🗑 送信取り消し</button>
</div>

<!-- ===== 編集履歴モーダル ===== -->
<div id="history-modal" class="modal-overlay hidden" onclick="closeHistoryModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title">編集前の内容</span>
      <button class="btn-ghost icon-btn" onclick="closeHistoryModal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="history-list" class="history-list"></div>
  </div>
</div>

<script src="chat.js"></script>
</body>
</html>
